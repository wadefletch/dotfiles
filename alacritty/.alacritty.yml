env:
  TERM: xterm-256color

window:
  padding:
    x: 25
    y: 25
  dynamic_padding: true
  decorations: "none"

font:
  normal:
    family: Iosevka
  bold:
    family: Iosevka
    style: Bold
  italic:
    family: Iosevka
    style: Italic
  size: 14.0

mouse:
  hide_when_typing: true

background_opacity: 1.0

# Colors (One Dark)
colors:
  # Default colors
  primary:
    background: '0x1e2127'
    foreground: '0xabb2bf'

  # Normal colors
  normal:
    black:   '0x1e2127'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xabb2bf'

  # Bright colors
  bright:
    black:   '0x5c6370'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xffffff'
